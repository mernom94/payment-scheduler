services:
  - type: web
    name: payment-scheduler
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: portfolio-redis
          property: connectionString
      - key: API_KEY
        sync: false
      - key: WORKER_ID
        value: scheduler-api-1

  - type: worker
    name: scheduler-worker
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m app.workers.scheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: portfolio-redis
          property: connectionString
      - key: API_KEY
        sync: false
      - key: WORKER_ID
        value: scheduler-worker-1

  - type: worker
    name: recovery-worker
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m app.workers.recovery
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: portfolio-redis
          property: connectionString
      - key: API_KEY
        sync: false
      - key: WORKER_ID
        value: recovery-worker-1