services:
  - type: web
    name: payment-scheduler
    runtime: python
    plan: free
    buildCommand: pip install -e && chmod +x start.sh
    startCommand: ./start.sh
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: portfolio-redis
          property: connectionString
      - key: API_KEY
        sync: false
      - key: WORKER_ID
        value: scheduler-api-1
